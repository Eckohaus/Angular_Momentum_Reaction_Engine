<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volumetric Visualizer</title>
    
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    
    <style>
        :root {
            --mdc-theme-primary: #BB86FC;
            --mdc-theme-secondary: #03DAC6;
            --mdc-theme-surface: #1e1e1e;
            --mdc-theme-on-surface: #E0E0E0;
            --divider: rgba(255, 255, 255, 0.12);
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--mdc-theme-surface);
            color: var(--mdc-theme-on-surface);
            margin: 0;
            padding: 24px;
            overflow-y: auto;
        }

        /* Material Tab Navigation */
        .tab-container {
            display: flex;
            border-bottom: 1px solid var(--divider);
            margin-bottom: 24px;
        }

        .tab {
            padding: 12px 24px;
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.875rem;
            font-weight: 500;
            letter-spacing: 1.25px;
            text-transform: uppercase;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s ease;
        }

        .tab:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--mdc-theme-on-surface);
        }

        .tab.active {
            color: var(--mdc-theme-primary);
            border-bottom: 2px solid var(--mdc-theme-primary);
        }

        /* Material Plot Cards */
        .plot-card {
            background: #252525;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 24px;
        }

        .plot-container {
            width: 100%;
            height: 50vh;
            min-height: 400px;
            background: #121212;
        }

        .card-footer {
            padding: 16px 20px;
            background: #252525;
            border-top: 1px solid var(--divider);
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.7);
        }

        .card-footer strong {
            color: var(--mdc-theme-secondary);
            display: block;
            margin-bottom: 4px;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            body { padding: 12px; }
            .tab { padding: 12px 8px; font-size: 0.75rem; flex: 1; text-align: center; }
            
            /* The Safe-Swipe Mobile Gutter */
            .plot-card {
                padding-right: 36px;
                position: relative;
                /* Visually separates the scroll gutter from the plot */
                background-image: linear-gradient(to right, #252525 calc(100% - 36px), #1a1a1a calc(100% - 36px));
            }
            
            /* UI Indicator for the gutter */
            .plot-card::after {
                content: "↕ SCROLL";
                position: absolute;
                right: -10px;
                top: 50%;
                transform: translateY(-50%) rotate(90deg);
                color: rgba(255, 255, 255, 0.4);
                font-size: 9px;
                letter-spacing: 2px;
                pointer-events: none;
            }
            
            .plot-container { height: 35vh; min-height: 280px; }
            .card-footer { padding-right: 12px; }
        }
    </style>
</head>
<body>

    <div class="tab-container">
        <button class="tab active" onclick="switchExperiment('A', this)">Engine Exp 01</button>
        <button class="tab" onclick="switchExperiment('B', this)">Engine Exp 02</button>
    </div>

    <div class="plot-card">
        <div class="plot-container" id="iersPlot"></div>
        <div class="card-footer">
            <strong>Control Set: IERS Earth Orientation</strong>
            Base orientation parameters tracking Combined RS/PC + Prediction sequences.
        </div>
    </div>

    <div class="plot-card">
        <div class="plot-container" id="formulaPlot"></div>
        <div class="card-footer" id="formulaFooter">
            <strong>AMRE Output: Volumetric Data (Variant A)</strong>
            Rendering trajectory computations from <code>formula_a.json</code>.
        </div>
    </div>

    <script>
        const darkLayout = {
            margin: { l: 0, r: 0, b: 0, t: 0 },
            paper_bgcolor: 'rgba(0,0,0,0)',
            plot_bgcolor: 'rgba(0,0,0,0)',
            scene: {
                xaxis: { gridcolor: '#333', zerolinecolor: '#555', tickfont: { color: '#888' }},
                yaxis: { gridcolor: '#333', zerolinecolor: '#555', tickfont: { color: '#888' }},
                zaxis: { gridcolor: '#333', zerolinecolor: '#555', tickfont: { color: '#888' }}
            }
        };

        let currentFormulaData = null;

        // Initialize Engine
        Promise.all([
            fetch('iers.json').then(r => r.json()),
            fetch('formula_a.json').then(r => r.json()),
            fetch('formula_b.json').then(r => r.json())
        ]).then(([iersData, formulaA, formulaB]) => {
            
            // Render Static IERS Data
            const fullSeries = [...(iersData?.iers?.combined_eop || []), ...(iersData?.iers?.predictions || [])];
            Plotly.newPlot('iersPlot', [{
                x: fullSeries.map(p => p.x_arcsec), y: fullSeries.map(p => p.y_arcsec), z: fullSeries.map(p => p.mjd),
                mode: 'markers', type: 'scatter3d',
                marker: { size: 2, color: fullSeries.map(p => p.mjd), colorscale: 'Viridis', opacity: 0.7 }
            }], darkLayout, { responsive: true });

            // Store formulas for tab switching
            currentFormulaData = { A: formulaA?.formula || [], B: formulaB?.formula || [] };
            
            // Render initial state (A)
            renderFormula('A');
        });

        function switchExperiment(variant, btnElement) {
            document.querySelectorAll('.tab').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
            
            document.getElementById('formulaFooter').innerHTML = `
                <strong>AMRE Output: Volumetric Data (Variant ${variant})</strong>
                Rendering trajectory computations from <code>formula_${variant.toLowerCase()}.json</code>.
            `;
            
            renderFormula(variant);
        }

        function renderFormula(variant) {
            const data = currentFormulaData[variant];
            const colorScale = variant === 'A' ? 'Plasma' : 'Inferno'; // Slight visual distinction between experiments

            Plotly.react('formulaPlot', [{
                x: data.map(p => p.x), y: data.map(p => p.y), z: data.map(p => p.z),
                mode: 'markers', type: 'scatter3d',
                marker: { size: 3, color: data.map(p => p.z), colorscale: colorScale, opacity: 0.8 }
            }], darkLayout, { responsive: true });
        }
    </script>
</body>
</html>
