<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMRE // Live Fortran Base Equation</title>
    
    <script src="../../../javascript/config_files/html_formatting/system_ui.js" defer></script>
    
    <style>
        body { background-color: #050505; color: #00cc00; font-family: 'Courier New', Courier, monospace; padding: 2vw; display: flex; justify-content: center; }
        .terminal-container { border: 1px solid #005500; background: #0a0a0a; padding: 25px; width: 100%; max-width: 800px; box-shadow: 0 0 15px rgba(0,255,0,0.05); }
        .control-panel { display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 20px; }
        .input-group { display: flex; flex-direction: column; }
        label { font-size: 12px; color: #00aa00; margin-bottom: 5px; text-transform: uppercase; }
        input { background: #000; border: 1px solid #005500; color: #00ff00; font-family: 'Courier New', monospace; padding: 5px; width: 120px; }
        input:focus { outline: none; border-color: #00ff00; }
        .output-panel { border: 1px dashed #003300; background: #000; padding: 15px; min-height: 150px; white-space: pre-wrap; margin-bottom: 20px; }
        .status { color: #88ff88; font-size: 12px; margin-bottom: 10px; text-transform: uppercase; }
        .pagination { border-top: 1px dashed #003300; padding-top: 15px; text-align: right; }
        .pagination a { color: #00cc00; text-decoration: none; font-size: 13px; font-weight: bold; }
        .pagination a:hover { color: #00ff00; text-decoration: underline; text-shadow: 0 0 5px rgba(0,255,0,0.4); }
    </style>
</head>
<body>
    <div class="terminal-container">
        <amre-header module-title="AMRE SYSTEM // INTERACTIVE BASE EQUATION"></amre-header>

        <div class="control-panel">
            <div class="input-group">
                <label>High</label>
                <input type="number" id="input_high" value="1.0536" step="0.0001">
            </div>
            <div class="input-group">
                <label>Low</label>
                <input type="number" id="input_low" value="1.0247" step="0.0001">
            </div>
            <div class="input-group">
                <label>Lambda Factor</label>
                <input type="number" id="input_lambda" value="1.14" step="0.01">
            </div>
            <div class="input-group">
                <label>Depth</label>
                <input type="number" id="input_depth" value="4" step="1">
            </div>
        </div>

        <div class="status" id="connection_status">[ ] STANDBY: Awaiting input matrix...</div>
        <div class="output-panel" id="json_output"></div>
    </div>

    <script>
        const API_ENDPOINT = "http://172.232.237.109:8080/api/electrical/base_equation";
        const inputs = [
            document.getElementById('input_high'),
            document.getElementById('input_low'),
            document.getElementById('input_lambda'),
            document.getElementById('input_depth')
        ];
        const outputDisplay = document.getElementById('json_output');
        const statusDisplay = document.getElementById('connection_status');

        async function runFortranEngine() {
            statusDisplay.innerText = "[*] PROCESSING: Transmitting variables to Fortran API...";
            outputDisplay.style.opacity = "0.5";
            const queryUrl = `${API_ENDPOINT}?high=${inputs[0].value}&low=${inputs[1].value}&lambda=${inputs[2].value}&depth=${inputs[3].value}`;
            try {
                const response = await fetch(queryUrl);
                const data = await response.json();
                statusDisplay.innerText = "[+] SUCCESS: Matrix recalculated via 64-bit double precision.";
                outputDisplay.innerText = JSON.stringify(data, null, 4);
                outputDisplay.style.opacity = "1";
            } catch (error) {
                statusDisplay.innerText = "[-] ERROR: Connection Blocked (Check Mixed Content / HTTP warning in browser).";
                outputDisplay.innerText = error;
            }
        }
        inputs.forEach(input => input.addEventListener('input', runFortranEngine));
        runFortranEngine();
    </script>
</body>
</html>
