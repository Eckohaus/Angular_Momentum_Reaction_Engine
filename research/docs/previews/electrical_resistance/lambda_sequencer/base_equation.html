<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8'>
  <title>JUPITER-IV-TERMINAL // Lambda Sequencer</title>
  <style>
    body { background-color: #050505; color: #d4d4d4; font-family: 'Courier New', Courier, monospace; padding: 2vw; display: flex; justify-content: center; }
    .terminal-container { border: 1px solid #333; background: #0a0a0a; padding: 25px; width: 100%; max-width: 700px; box-shadow: 0 0 15px rgba(0,255,0,0.05); }
    h2 { color: #00ff00; font-size: 14px; border-bottom: 1px solid #333; padding-bottom: 10px; margin-top: 0; text-transform: uppercase; letter-spacing: 2px; }
    .sys-text { color: #555; font-size: 10px; display: block; margin-bottom: 20px; text-transform: uppercase; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; letter-spacing: 0.5px; }
    th, td { padding: 10px 15px; text-align: left; border-bottom: 1px dashed #222; }
    th { color: #888; font-weight: normal; text-transform: lowercase; }
    .highlight-row { color: #ff9d00; }
    .target-row { color: #00ff00; font-weight: bold; border-top: 1px solid #00ff00; border-bottom: none; }
    .variable-col { color: #666; font-style: italic; }
    .val { font-family: 'Consolas', monospace; }
  </style>
</head>
<body>
  <div class='terminal-container'>
    <h2>Calculating Variables: Lambda Sequence</h2>
    <span class='sys-text'>Gateway: Active // Env: Fortran_BareMetal</span>
    <table>
      <thead>
        <tr>
          <th>Parameter</th>
          <th>Value</th>
          <th><span class='variable-col'>Var Ref</span></th>
        </tr>
      </thead>
      <tbody>
        <tr><td>High</td><td class='val'>1.0824</td><td class='variable-col'>h</td></tr>
        <tr><td>Low</td><td class='val'>1.0813</td><td class='variable-col'>l</td></tr>
        <tr class='highlight-row'><td>Differential (H - L)</td><td class='val'>0.0011</td><td class='variable-col'>diff</td></tr>
        <tr><td>Average</td><td class='val'>1.08185</td><td class='variable-col'>avg</td></tr>
        <tr><td>Wave 5 Growth</td><td class='val'>0.001858</td><td class='variable-col'>w5</td></tr>
        <tr class='target-row'><td>Output Target</td><td class='val'>1.083708</td><td class='variable-col'>target</td></tr>
      </tbody>
    </table>
  </div>
</body>
</html>
