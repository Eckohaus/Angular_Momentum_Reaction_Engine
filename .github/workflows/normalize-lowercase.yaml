name: Normalize Lowercase Repo

on:
  workflow_dispatch:  # run manually from Actions tab

jobs:
  lowercase:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Normalize all files/folders to lowercase
        run: |
          set -e
          find . -depth | while read f; do
            lower=$(dirname "$f")/$(basename "$f" | tr 'A-Z' 'a-z')
            if [ "$f" != "$lower" ]; then
              git mv "$f" "${lower}_tmp" || true
              git mv "${lower}_tmp" "$lower" || true
            fi
          done

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "Normalize repo paths to lowercase" || echo "No changes"
          git push
