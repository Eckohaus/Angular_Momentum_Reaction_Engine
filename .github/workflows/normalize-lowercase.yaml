name: Normalize paths to lowercase

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  lowercase:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Normalize paths to lowercase
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          # Normalize everything EXCEPT .github/
          find . -depth -print | grep -v '^./.github/' | while read path; do
            lower=$(echo "$path" | tr '[:upper:]' '[:lower:]')
            if [ "$path" != "$lower" ]; then
              echo "Renaming $path -> $lower"
              git mv -f "$path" "$lower" || true
            fi
          done

          git add -A
          git commit -m "Normalize repo paths to lowercase" || echo "No changes"
          git push
