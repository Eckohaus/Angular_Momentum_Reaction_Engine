name: Normalize Repo Paths to Lowercase

on:
  workflow_dispatch:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  normalize:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Normalize paths to lowercase
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          # Use git mv to rename everything to lowercase
          find . -depth -print | while read path; do
            lower=$(echo "$path" | tr '[:upper:]' '[:lower:]')
            if [ "$path" != "$lower" ]; then
              git mv -f "$path" "$lower" || true
            fi
          done

          git add -A
          git commit -m "Normalize repo paths to lowercase" || echo "No changes"
          git push
