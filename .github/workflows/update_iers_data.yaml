name: Update IERS Volumetric Data

on:
  schedule:
    - cron: '0 3 * * *' # 3:00 AM UTC Daily
  workflow_dispatch: # Allows manual triggering from GitHub UI

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout AMRE Repository
        uses: actions/checkout@v3

      - name: Setup Python environment
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install Compute Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests numpy pandas

      - name: Execute IERS Data Fetch & Computation
        run: |
          python engine/tools/volumetric_data/fetch_iers_data.py
          if [ -f "engine/tools/volumetric_data/compute.py" ]; then python engine/tools/volumetric_data/compute.py; fi

      - name: Commit and Push Updated Arrays
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add research/docs/visual/volumetric/*.json
          git commit -m "chore(data): automated daily IERS volumetric sync [skip ci]" || echo "No changes to commit"
          git push
