name: Codec Translation Tests

on:
  push:
    branches:
      - master
      - main
    paths:
      - "engine/codec/**"
      - ".github/workflows/test-codec.yaml"
  pull_request:
    paths:
      - "engine/codec/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: 🧬 Codec Validation Suite
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: ⚙️ Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: 🧪 Run Codec Tests
        run: |
          echo "=== Discovering Codec Test Suites ==="
          if [ -d "engine/codec" ]; then
            # Set PYTHONPATH so the internal Python imports resolve correctly
            PYTHONPATH=engine pytest -v engine/codec
          else
            echo "❌ Directory 'engine/codec' not found"
            exit 1
          fi

      - name: 📊 Summarize Results
        if: always()
        run: |
          echo "=============================="
          echo "✅ Codec translation tests completed"
          echo "=============================="
