name: Codec Translation Tests

on:
  push:
    paths:
      - "codec/**"
      - ".github/workflows/test-codec.yaml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v3

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: ⚙️ Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: 🧪 Run Codec Tests
        run: |
          echo "=== Discovering Codec Test Suites ==="
          find codec -type d -name "tests" || echo "No tests folder found."
          echo "=== Running pytest ==="
          pytest -v codec

      - name: 📊 Summarize Results
        if: always()
        run: |
          echo "=============================="
          echo "✅ Codec translation tests completed"
          echo "=============================="

