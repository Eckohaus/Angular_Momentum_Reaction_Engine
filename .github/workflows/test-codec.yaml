name: Codec Translation Tests

on:
  push:
    paths:
      - "amre/codec/**"
      - ".github/workflows/test-codec.yaml"
  pull_request:
    paths:
      - "amre/codec/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v3

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: 🧩 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: 🧪 Discover and run all codec tests
        run: |
          echo "=== Discovering Codec Test Suites ==="
          find amre/codec -type d -name "tests"
          echo "=== Running pytest ==="
          pytest -v amre/codec

      - name: 📊 Report results
        if: success()
        run: echo "✅ All codec translation tests passed successfully."
