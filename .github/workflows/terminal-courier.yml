name: AMRE to Terminal Courier (Dual Org)

on:
  push:
    branches: [ master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  inject-and-mirror:
    if: github.repository_owner == 'Eckohaus'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout AMRE Sandbox
        uses: actions/checkout@v4
        with:
          path: 'source-amre'
          fetch-depth: 0
          persist-credentials: false

      - name: Checkout Jupiter-IV Terminal (ID)
        uses: actions/checkout@v4
        with:
          repository: 'Eckohaus-Indonesia/jupiter-IV-terminal'
          token: ${{ secrets.ORG_MIRROR_TOKEN }}
          path: 'dest-terminal-id'

      - name: Checkout Jupiter-IV Terminal (UK)
        uses: actions/checkout@v4
        with:
          repository: 'Eckohaus-Ltd/jupiter-IV-terminal'
          token: ${{ secrets.ORG_MIRROR_TOKEN }}
          path: 'dest-terminal-uk'

      # Step 3: Inject AMRE into both Terminal subfolders
      - name: Sync AMRE Module to Subfolders
        run: |
          # Sync ID
          rm -rf dest-terminal-id/amre
          mkdir -p dest-terminal-id/amre
          rsync -av --exclude='.git' --exclude='.github' source-amre/ dest-terminal-id/amre/
          
          # Sync UK
          rm -rf dest-terminal-uk/amre
          mkdir -p dest-terminal-uk/amre
          rsync -av --exclude='.git' --exclude='.github' source-amre/ dest-terminal-uk/amre/

      # Step 4: Deploy Subfolder Updates to Main
      - name: Deploy to Kupu-Home (Dual)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Push to ID
          cd $GITHUB_WORKSPACE/dest-terminal-id
          git add .
          git commit -m "build(amre): auto-sync engine to terminal subfolder" || echo "No changes"
          git push origin main
          
          # Push to UK
          cd $GITHUB_WORKSPACE/dest-terminal-uk
          git add .
          git commit -m "build(amre): auto-sync engine to terminal subfolder" || echo "No changes"
          git push origin main

      # Step 5: Mirror All Other Branches
      - name: Sync Modular Branches (Dual Org)
        run: |
          cd $GITHUB_WORKSPACE/source-amre
          
          # Add ID Remote
          git remote add target-id https://x-access-token:${{ secrets.ORG_MIRROR_TOKEN }}@github.com/Eckohaus-Indonesia/jupiter-IV-terminal.git
          git push --force target-id "refs/remotes/origin/*:refs/heads/*"
          
          # Add UK Remote
          git remote add target-uk https://x-access-token:${{ secrets.ORG_MIRROR_TOKEN }}@github.com/Eckohaus-Ltd/jupiter-IV-terminal.git
          git push --force target-uk "refs/remotes/origin/*:refs/heads/*"
