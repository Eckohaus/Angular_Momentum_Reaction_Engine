name: AMRE to Terminal Courier

on:
  push:
    branches: [ master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  inject-and-mirror:
    if: github.repository_owner == 'Eckohaus'
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Grab full AMRE history and all branches
      - name: Checkout AMRE Sandbox
        uses: actions/checkout@v4
        with:
          path: 'source-amre'
          fetch-depth: 0

      # Step 2: Grab the official Jupiter-IV Terminal
      - name: Checkout Jupiter-IV Terminal
        uses: actions/checkout@v4
        with:
          repository: 'Eckohaus-Indonesia/jupiter-IV-terminal'
          token: ${{ secrets.ORG_MIRROR_TOKEN }}
          path: 'dest-terminal'
          fetch-depth: 0

      # Step 3: Subfolder Injection (Your existing logic)
      - name: Sync AMRE Module to Subfolder
        run: |
          rm -rf dest-terminal/amre
          mkdir -p dest-terminal/amre
          rsync -av --exclude='.git' --exclude='.github' source-amre/ dest-terminal/amre/

      # Step 4: Deploy Subfolder Update to Main
      - name: Deploy to Kupu-Home (Main)
        run: |
          cd dest-terminal
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "build(amre): auto-sync latest engine iteration to terminal subfolder" || echo "No changes to sync"
          git push origin main

      # Step 5: Mirror All Other Branches (The modular fix)
      - name: Sync Modular Branches
        run: |
          cd source-amre
          # Injecting the token directly into the remote URL for authentication
          git remote add target-terminal https://x-access-token:${{ secrets.ORG_MIRROR_TOKEN }}@github.com/Eckohaus-Indonesia/jupiter-IV-terminal.git
          
          # Force push the local tracking branches to the organization heads
          git push --force target-terminal "refs/remotes/origin/*:refs/heads/*"
