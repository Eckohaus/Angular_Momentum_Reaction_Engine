name: Maintenance Normalize Paths

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  normalize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Normalize repo paths to lowercase (excluding workflows)
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          # Only rename files in data/, docs/, and root — exclude .github/workflows
          for f in $(git ls-files | grep -v '^.github/workflows/'); do
            lower=$(echo "$f" | tr '[:upper:]' '[:lower:]')
            if [ "$f" != "$lower" ]; then
              mkdir -p "$(dirname "$lower")"
              git mv -f "$f" "$lower"
            fi
          done

          git commit -m "Maintenance: normalize paths to lowercase (excluding workflows)" || echo "No changes"
          git push
