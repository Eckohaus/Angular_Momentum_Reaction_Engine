name: Maintenance

on:
  workflow_dispatch:

permissions:
  contents: write   # allow pushing changes
  workflows: read   # read workflows, but don't try to rename them

jobs:
  normalize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Normalize file paths to lowercase
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          changes=false

          # Only normalize files outside workflows
          for f in $(git ls-files | grep -v '^.github/workflows/'); do
            lower=$(echo "$f" | tr '[:upper:]' '[:lower:]')

            if [ "$f" != "$lower" ]; then
              mkdir -p "$(dirname "$lower")"

              if [ -e "$lower" ]; then
                # Case conflict: rename via a unique temp file
                tmp="$(dirname "$lower")/.__tmp_$(uuidgen)_$(basename "$lower")"
                git mv -f "$f" "$tmp"
                git mv -f "$tmp" "$lower"
              else
                git mv -f "$f" "$lower"
              fi

              echo "Renamed: $f -> $lower"
              changes=true
            fi
          done

          if [ "$changes" = true ]; then
            git commit -m "Maintenance: normalize paths to lowercase (safe UUID two-step)" || echo "No changes"
            git push
          else
            echo "No files needed renaming."
          fi
