name: Maintenance

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  normalize-lowercase:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Normalize file paths to lowercase (safe two-step)
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          changes=false

          for f in $(git ls-files | grep -v '^.github/workflows/'); do
            lower=$(echo "$f" | tr '[:upper:]' '[:lower:]')

            if [ "$f" != "$lower" ]; then
              mkdir -p "$(dirname "$lower")"

              if [ -e "$lower" ]; then
                echo "⚠️ Skipping $f (already exists as $lower)"
                continue
              fi

              tmp="${f}.tmp"
              git mv -f "$f" "$tmp" || continue
              git mv -f "$tmp" "$lower" || { rm -f "$tmp"; continue; }

              echo "Renamed: $f -> $lower"
              changes=true
            fi
          done

          if [ "$changes" = true ]; then
            git commit -m "Maintenance: normalize paths to lowercase (safe two-step)"
            git push
          else
            echo "No files needed renaming."
          fi
