# .github/workflows/maintenance.yaml
name: Maintenance (Normalize Lowercase)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  normalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Normalize repo paths to lowercase
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git ls-files | while read f; do
            lower=$(echo "$f" | tr '[:upper:]' '[:lower:]')
            if [ "$f" != "$lower" ]; then
              mkdir -p "$(dirname "$lower")"
              git mv -f "$f" "$lower"
            fi
          done
          git commit -m "Maintenance: normalize paths to lowercase" || echo "No changes"
          git push

      - name: Rotate logs (keep 7 latest)
        run: |
          mkdir -p logs
          log_file="logs/$(date +'%Y-%m-%d_%H-%M-%S')_maintenance.log"
          echo "✅ Maintenance run at $(date)" > "$log_file"
          ls -tp logs/*.log | grep -v '^\S*\/'$(ls -tp logs/*.log | head -n 7 | tr '\n' '|') | xargs -r rm --
