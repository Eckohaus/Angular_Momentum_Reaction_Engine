name: XLSX to HTML Previews

on:
  push:
    branches:
      - master
    paths:
      - 'data/spreadsheets/**/*.xlsx'
  schedule:
    - cron: "0 3 * * *"   # run daily at 03:00 UTC
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          ref: master
          persist-credentials: true
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install pandas openpyxl

      - name: Convert XLSX to HTML and regenerate index
        run: python scripts/convert_xlsx.py

      - name: Debug – list previews
        run: ls -lh previews || echo "No previews generated"

      - name: Commit previews and index
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Read changed files list (from Python script)
          CHANGED=$(cat changed_files.txt || echo "previews + index")

          # Add the entire previews folder, not just *.html
          git add previews docs/in_development_previews.md || true
          git commit -m "Update previews: $CHANGED" || echo "No changes to commit"
          git push || true
