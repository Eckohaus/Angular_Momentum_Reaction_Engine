name: XLSX to HTML Previews

on:
  push:
    paths:
      - 'data/spreadsheets/**/*.xlsx'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install pandas openpyxl tabulate

      - name: Convert XLSX to HTML
        run: |
          mkdir -p docs/previews
          for file in $(find data/spreadsheets -name '*.xlsx'); do
            outfile="docs/previews/$(basename ${file%.*}).html"
            python - << 'EOF'
import pandas as pd, sys, os
file = sys.argv[1]
outfile = sys.argv[2]
xls = pd.ExcelFile(file)
with open(outfile, "w", encoding="utf-8") as f:
    f.write("<h1>{}</h1>".format(os.path.basename(file)))
    for sheet in xls.sheet_names:
        df = pd.read_excel(file, sheet_name=sheet)
        f.write(f"<h2>Sheet: {sheet}</h2>")
        f.write(df.to_html(index=False, escape=False))
EOF
          done
