name: XLSX to HTML Previews

on:
  push:
    branches:
      - master
    paths:
      - 'data/spreadsheets/**/*.xlsx'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install pandas openpyxl

      - name: Convert XLSX to HTML
        run: |
          mkdir -p docs/previews
          for file in $(find data/spreadsheets -name '*.xlsx'); do
            base=$(basename "$file" .xlsx)
            outfile="docs/previews/${base}.html"
            FILE="$file" OUTFILE="$outfile" python << 'EOF'
import pandas as pd, os
file = os.environ["FILE"]
outfile = os.environ["OUTFILE"]
xls = pd.ExcelFile(file)
with open(outfile, "w", encoding="utf-8") as f:
    f.write(f"<h1>{os.path.basename(file)}</h1>")
    for sheet in xls.sheet_names:
        df = pd.read_excel(file, sheet_name=sheet)
        f.write(f"<h2>Sheet: {sheet}</h2>")
        f.write(df.to_html(index=False, escape=False))
EOF
          done

      - name: Debug – list previews
        run: ls -lh docs/previews

      - name: Commit previews
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/previews/*.html
          git commit -m "Update XLSX HTML previews" || echo "No changes to commit"
          git push
