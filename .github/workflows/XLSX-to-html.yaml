name: XLSX to HTML Previews

permissions:
  contents: write   # allow workflow to push commits back to the repo

on:
  push:
    branches:
      - master
    paths:
      - 'data/spreadsheets/**/*.xlsx'
  schedule:
    - cron: "0 3 * * *"   # run daily at 03:00 UTC
  workflow_dispatch:

env:
  KEEP_LOGS: 7     # how many log files to keep
  KEEP_LINES: 500  # how many lines to keep in cleanup_log.txt

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          ref: master
          persist-credentials: true
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install pandas openpyxl xlsx2html

      - name: Clean previews before regeneration
        run: |
          echo "🧹 Cleaning old previews..."
          rm -rf previews/*

      - name: Convert XLSX to HTML and regenerate index
        run: |
          set -o pipefail
          mkdir -p logs
          log_file="logs/$(date +'%Y-%m-%d_%H-%M-%S')_convert_xlsx.log"
          python scripts/convert_xlsx.py > "$log_file" 2>&1 || echo "⚠️ Python preview pipeline failed, see $log_file"

      - name: Prune old logs
        run: |
          ls -t logs/*.log | tail -n +$(( $KEEP_LOGS + 1 )) | xargs -r rm -- || true

      - name: Debug – list previews
        run: ls -lh previews || echo "No previews generated"

      - name: Prune cleanup_log.txt
        run: |
          echo "🧹 Pruning cleanup_log.txt (keeping last $KEEP_LINES lines)..."
          tail -n $KEEP_LINES cleanup_log.txt > cleanup_log.tmp || true
          mv cleanup_log.tmp cleanup_log.txt || true

      - name: Commit previews, index, and logs
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git checkout master

          # Remove old .md index if it exists
          if [ -f docs/in_development_previews.md ]; then
            git rm docs/in_development_previews.md
          fi

          # Stage previews, index, and logs
          git add -A previews docs/in_development_previews.html || true
          git add logs/*.log cleanup_log.txt 2>/dev/null || true

          # Commit only if there are changes
          git diff --cached --quiet || git commit -m "Update XLSX HTML previews, index, and logs"

          # Push back to master
          git push origin master
