name: XLSX to HTML Previews

permissions:
  contents: write   # allow workflow to push commits back to the repo

on:
  push:
    branches:
      - master
    paths:
      - 'data/spreadsheets/**/*.xlsx'
  schedule:
    - cron: "0 3 * * *"   # run daily at 03:00 UTC
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          ref: master
          persist-credentials: true
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install pandas openpyxl

      - name: Convert XLSX to HTML and regenerate index
        run: python scripts/convert_xlsx.py

      - name: Debug – list previews
        run: ls -lh previews || echo "No previews generated"

      - name: Ensure logs folder exists
        run: |
          mkdir -p logs
          if [ ! -f logs/.gitkeep ]; then
            echo "# Placeholder to keep logs directory tracked by Git" > logs/.gitkeep
          fi

      - name: Commit previews, index, and logs
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git checkout master

          # Remove old .md index if it exists
          if [ -f docs/in_development_previews.md ]; then
            git rm docs/in_development_previews.md
          fi

          # Stage previews, index, and logs
          git add -A previews docs/in_development_previews.html cleanup_log.txt logs/

          # Commit only if there are changes
          git diff --cached --quiet || git commit -m "Update previews, index, and logs"

          # Push back to master
          git push origin master
