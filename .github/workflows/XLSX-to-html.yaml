name: XLSX to HTML Previews

on:
  push:
    branches:
      - master
    paths:
      - 'data/spreadsheets/**/*.xlsx'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          ref: master
          persist-credentials: true
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install pandas openpyxl

      - name: Convert XLSX to HTML
        run: python scripts/convert_xlsx.py

      - name: Debug – list previews
        run: ls -lh previews || echo "No previews generated"

      - name: Commit previews
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add previews/*.html || true
          git commit -m "Update XLSX HTML previews" || echo "No changes to commit"
          git push || true
