<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ultralight Fortran Stack | Jupiter-IV-TERMINAL</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    :root {
      --void-bg: #050505;
      --panel-bg: #0f0f0f;
      --accent-terminal: #00ff41; /* Kupu / Terminal Green */
      --tech-border: #2a2a2a;
      --text-dim: #888;
      --text-bright: #e0e0e0;
    }

    body {
      font-family: 'Courier New', Courier, monospace;
      margin: 0;
      padding: 0;
      line-height: 1.6;
      background-color: var(--void-bg);
      color: var(--text-bright);
    }

    /* Navigation - Administrative UI feel */
    nav {
      background: #000;
      padding: 0.8rem 1.5rem;
      border-bottom: 1px solid var(--tech-border);
      font-size: 0.8rem;
      letter-spacing: 1px;
    }

    nav a {
      color: var(--text-dim);
      text-decoration: none;
      margin-right: 20px;
      transition: color 0.2s;
    }

    nav a:hover, nav a.active {
      color: var(--accent-terminal);
    }

    /* Header - Technical Specification Style */
    header {
      padding: 3rem 1.5rem;
      max-width: 800px;
      margin: 0 auto;
      border-bottom: 1px solid var(--tech-border);
    }

    header h1 {
      font-size: 1.4rem;
      font-weight: normal;
      margin: 0;
      text-transform: uppercase;
      letter-spacing: 4px;
      color: var(--accent-terminal);
    }

    header::after {
      content: "STATUS: FORTRAN_STACK_ACTIVE";
      font-size: 0.7rem;
      color: var(--text-dim);
      display: block;
      margin-top: 5px;
    }

    main {
      padding: 2rem 1.5rem;
      max-width: 800px;
      margin: auto;
    }

    section {
      margin-bottom: 2rem;
      background: var(--panel-bg);
      border: 1px solid var(--tech-border);
      padding: 2rem; 
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      margin-bottom: 0.5rem;
      color: var(--text-dim);
      font-size: 0.9rem;
      letter-spacing: 1px;
    }

    input[type="number"] {
      width: 100%;
      padding: 0.8rem;
      background: #0a0a0a;
      border: 1px solid var(--tech-border);
      color: var(--accent-terminal);
      font-family: 'Courier New', Courier, monospace;
      box-sizing: border-box;
      transition: border-color 0.2s;
    }

    input[type="number"]:focus {
      outline: none;
      border-color: var(--accent-terminal);
    }

    button {
      background: #0a0a0a;
      color: var(--text-bright);
      border: 1px solid var(--tech-border);
      padding: 0.8rem 2rem;
      font-family: 'Courier New', Courier, monospace;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 2px;
      transition: all 0.2s;
    }

    button:hover {
      background: var(--tech-border);
      color: var(--accent-terminal);
      border-color: var(--accent-terminal);
    }

    .result-panel {
      margin-top: 2rem;
      padding: 1.5rem;
      background: #0a0a0a;
      border-left: 3px solid var(--accent-terminal);
      display: none; /* Hidden until calculation */
    }

    .result-panel.active {
      display: block;
    }

    .result-label {
      font-size: 0.7rem;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    .result-value {
      font-size: 1.2rem;
      color: var(--text-bright);
    }

    code {
      background: #1a1a1a;
      color: var(--accent-terminal);
      padding: 2px 6px;
      border-radius: 3px;
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--void-bg); }
    ::-webkit-scrollbar-thumb { background: var(--tech-border); }

  </style>
</head>

<body>

<nav>
  <a href="./index.html" class="active">CALC_MODULE_01</a>
  <a href="#">SYSTEM_LOGS</a>
</nav>

<header>
  <h1>Ultralight Fortran Stack</h1>
</header>

<main>
  <section>
    <form id="calcForm">
      <div class="form-group">
        <label for="massInput">DATA_INPUT: MASS (KG)</label>
        <input type="number" step="any" id="massInput" placeholder="Enter mass variable..." required>
      </div>
      <button type="submit">Execute Calculation</button>
    </form>

    <div class="result-panel" id="resultPanel">
      <div class="result-label">OUTPUT: ENERGY (JOULES)</div>
      <div class="result-value" id="resultValue"></div>
      <div style="margin-top: 10px; font-size: 0.75rem; color: #888;">
        Model: <code>E = mc²</code> | <i>c = 299,792,458 m/s</i>
      </div>
    </div>
  </section>
</main>

<script>
  document.getElementById('calcForm').addEventListener('submit', function(e) {
    e.preventDefault();
    
    // Fetch input
    const mass = parseFloat(document.getElementById('massInput').value);
    
    // Constants & Calculation
    const c = 299792458.0;
    const energy = mass * c * c;
    
    // Display formatting
    const resultPanel = document.getElementById('resultPanel');
    const resultValue = document.getElementById('resultValue');
    
    // Format output with scientific notation if very large, otherwise standard
    const formattedEnergy = energy > 1e10 ? energy.toExponential(4) : energy.toLocaleString();
    
    resultValue.innerHTML = `${formattedEnergy} J`;
    resultPanel.classList.add('active');
  });
</script>

</body>
</html>
